<div class="auth-page">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>Вход</mat-card-title>
      <mat-card-subtitle>Дневник трейдера</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline" class="full">
          <mat-label>Имя пользователя</mat-label>
          <input matInput formControlName="username" autocomplete="username" />
          @if (form.controls.username.hasError('required')) {
            <mat-error>Обязательное поле</mat-error>
          }
        </mat-form-field>
        <mat-form-field appearance="outline" class="full">
          <mat-label>Пароль</mat-label>
          <input matInput type="password" formControlName="password" autocomplete="current-password" />
          @if (form.controls.password.hasError('required')) {
            <mat-error>Обязательное поле</mat-error>
          }
        </mat-form-field>
        <button mat-flat-button color="primary" class="full" type="submit">Войти</button>
      </form>
    </mat-card-content>
    <mat-card-actions>
      <a mat-button routerLink="/register">Создать аккаунт</a>
    </mat-card-actions>
  </mat-card>
</div>
