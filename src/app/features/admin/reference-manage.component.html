<div class="page-header">
  <h1>{{ title }}</h1>
  <button mat-flat-button color="primary" type="button" (click)="create()">
    <mat-icon>add</mat-icon>
    Создать
  </button>
</div>

<div class="table-wrap">
  <table mat-table [dataSource]="rows" class="full-table">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Название</th>
      <td mat-cell *matCellDef="let row">{{ row.name }}</td>
    </ng-container>
    <ng-container matColumnDef="description">
      <th mat-header-cell *matHeaderCellDef>Описание</th>
      <td mat-cell *matCellDef="let row">{{ row.description || '—' }}</td>
    </ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let row" class="row-actions">
        <button mat-icon-button type="button" (click)="edit(row)" aria-label="Изменить">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button type="button" color="warn" (click)="remove(row)" aria-label="Удалить">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
  @if (!rows.length) {
    <p class="empty">Нет записей</p>
  }
</div>
